name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Lint, Type Check, and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript Compile Check
        run: npx tsc --noEmit

      - name: ESLint Check
        run: npm run lint --if-present

      - name: Clear Jest Cache
        run: npx jest --clearCache

      - name: Run Jest Tests
        run: npm test --if-present
        continue-on-error: true

      - name: Firebase Emulator Rules Test
        run: |
          npm install -g firebase-tools
          firebase emulators:exec "npm run test:rules" --project demo-project

  functions-lint:
    name: Cloud Functions Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Lint Functions
        run: npm run lint --if-present

  android-build:
    name: Android Debug Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: gradle

      - name: Install Node Modules
        run: npm ci

      - name: Build Android Debug
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug
